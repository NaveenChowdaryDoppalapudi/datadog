################################################################################
# Datadog Agent Helm Values for T360 AKS Cluster
# Cluster: zuse1-d003-b066-aks-p1-t360-b
#
# Usage:
#   helm repo add datadog https://helm.datadoghq.com
#   helm repo update
#   helm install datadog datadog/datadog -f datadog-values.yaml -n datadog --create-namespace
#
# Update:
#   helm upgrade datadog datadog/datadog -f datadog-values.yaml -n datadog
################################################################################

# ──────────────────────────────────────────────────────────────────────────────
# API Keys - Use Kubernetes secrets in production
# Create secret first:
#   kubectl create secret generic datadog-secret \
#     --from-literal=api-key=<YOUR_API_KEY> \
#     --from-literal=app-key=<YOUR_APP_KEY> \
#     -n datadog
# ──────────────────────────────────────────────────────────────────────────────
datadog:
  apiKeyExistingSecret: datadog-secret
  appKeyExistingSecret: datadog-secret

  # Cluster identification
  clusterName: zuse1-d003-b066-aks-p1-t360-b

  # Tags applied to all metrics from this cluster
  tags:
    - "env:production"
    - "app:t360"
    - "cluster:zuse1-d003-b066-aks-p1-t360-b"
    - "team:ipm-ops"

  # ── Kubernetes Integration ──────────────────────────────────────────────────
  collectEvents: true
  leaderElection: true
  criSocketPath: /var/run/containerd/containerd.sock

  kubelet:
    tlsVerify: false

  # ── Logs ────────────────────────────────────────────────────────────────────
  logs:
    enabled: true
    containerCollectAll: true
    containerCollectUsingFiles: true

  # ── APM (Application Performance Monitoring) ───────────────────────────────
  apm:
    portEnabled: true
    socketEnabled: true

  # ── Process Monitoring ──────────────────────────────────────────────────────
  processAgent:
    enabled: true
    processCollection: true
    processDiscoveryEnabled: true

  # ── Network Performance Monitoring ──────────────────────────────────────────
  networkMonitoring:
    enabled: true

  # ── Orchestrator Explorer (Live Containers) ─────────────────────────────────
  orchestratorExplorer:
    enabled: true

  # ── Prometheus / OpenMetrics scraping ───────────────────────────────────────
  prometheusScrape:
    enabled: true
    serviceEndpoints: true

  # ── System Probe (for disk, network monitoring) ─────────────────────────────
  systemProbe:
    enableTCPQueueLength: true
    enableOOMKill: true

# ── Cluster Agent ─────────────────────────────────────────────────────────────
clusterAgent:
  enabled: true
  replicas: 2

  metricsProvider:
    enabled: true
    useDatadogMetrics: true

  admissionController:
    enabled: true
    mutateUnlabelled: false

  # Cluster checks (for Items 2, 3 - synthetic-like from within cluster)
  clusterChecks:
    enabled: true

  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ── Node Agent ────────────────────────────────────────────────────────────────
agents:
  containers:
    agent:
      resources:
        requests:
          cpu: 200m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi

    processAgent:
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi

    traceAgent:
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi

  # Tolerations for Windows nodes (if applicable for T360 AKS)
  tolerations:
    - key: "kubernetes.io/os"
      operator: "Equal"
      value: "windows"
      effect: "NoSchedule"

  # Prioritize on all nodes
  priorityClassName: system-node-critical

  # Custom checks configuration
  customAgentConfig:
    # Additional disk check configuration
    confd:
      disk.yaml: |-
        init_config:
        instances:
          - use_mount: false
            excluded_filesystems:
              - tmpfs
              - devtmpfs
              - proc
              - sysfs
            tag_by_filesystem: true
            tag_by_label: true
            min_disk_size: 0

# ── DogStatsD ─────────────────────────────────────────────────────────────────
# Needed for custom metrics from PowerShell scripts (Items 10, 13)
datadog:
  dogstatsd:
    port: 8125
    nonLocalTraffic: true
    useHostPort: true

# ── Kube State Metrics ────────────────────────────────────────────────────────
# Required for Items 1, 8, 12
datadog:
  kubeStateMetricsEnabled: true
  kubeStateMetricsCore:
    enabled: true
